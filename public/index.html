<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We're so f-cked</title>
  <style>
    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Light.woff') format('woff');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Bold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Light-Italic.woff') format('woff');
      font-weight: 300;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Regular-Italic.woff') format('woff');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Medium-Italic.woff') format('woff');
      font-weight: 500;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Bold-Italic.woff') format('woff');
      font-weight: 700;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super Text';
      src: url('/fonts/GT-Super-Web/GT-Super-Text-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super Text';
      src: url('/fonts/GT-Super-Web/GT-Super-Text-Regular-Italic.woff') format('woff');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super Text';
      src: url('/fonts/GT-Super-Web/GT-Super-Text-Medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super Text';
      src: url('/fonts/GT-Super-Web/GT-Super-Text-Bold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Verlag';
      src: url('/fonts/Verlag/Verlag-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Verlag';
      src: url('/fonts/Verlag/Verlag-Bold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: antiquewhite;
      --surface: #e0dcd4;
      --border: #c9c4b8;
      --text: #2c2424;
      --muted: #666;
      --accent: #ff3c00;
      --newsletter: #4ade80;
      --newsroom: #60a5fa;
      --podcast: #f59e0b;
      --video: #c084fc;
    }

    [data-theme="dark"] {
      --bg: #0c0923;
      --surface: #03011f;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #bebebe;
      --accent: #ff5a28;
      --newsletter: #4ade80;
      --newsroom: #60a5fa;
      --podcast: #f59e0b;
      --video: #c084fc;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'GT Super Text', 'Georgia', serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── HEADER ── */
    header {
      padding: 1rem 2rem 0.4rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .header-title-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .site-title {
      font-size: 8rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      font-family: 'GT Super', sans-serif;
      text-transform: titlecase;
      font-style: italic;
    }

    .site-title span { color: var(--text); }

    .site-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      font-family: 'Verlag', sans-serif;
    }

    #theme-toggle {
      background: none;
      border: none;
      border-radius: 50%;
      padding: 0.5rem;
      cursor: pointer;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, color 0.2s;
    }
    #theme-toggle:hover {
      transform: translateY(-2px);
      color: var(--accent);
    }
    #theme-toggle svg { width: 1.15rem; height: 1.15rem; }

    /* ── TOPIC FILTER ── */
    .filter-row {
      padding: 0.4rem 2rem 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      --topic-color: var(--text);
      position: relative;
      background: none;
      border: none;
      color: var(--text);
      padding: 0.35rem 0 0.35rem 1.5rem;
      cursor: pointer;
      font-size: 1.5rem;
      font-family: 'GT Super', 'Georgia', serif;
      font-weight: 700;
      font-style: normal;
      transition: font-style 0.15s;
      white-space: nowrap;
      text-decoration: none;
    }
    .filter-btn::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--topic-color);
      font-weight: 700;
    }
    /* Invisible italic copy reserves width so hover doesn’t shift layout */
    .filter-btn .filter-btn-width {
      display: inline-block;
      font-style: italic;
      visibility: hidden;
      white-space: nowrap;
      pointer-events: none;
    }
    .filter-btn .filter-btn-text {
      position: absolute;
      left: 1.5rem;
      top: 0.35rem;
      font-style: normal;
      transition: font-style 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 0 0 transparent;
    }
    .filter-btn:hover .filter-btn-text {
      font-style: italic;
      box-shadow: 0 3px 0 0 var(--topic-color);
    }
    .filter-btn:hover::before { font-style: italic; }
    .filter-btn.active { color: var(--topic-color); }
    .filter-btn.active .filter-btn-text { box-shadow: 0 3px 0 0 var(--topic-color); }

    .filter-btn + .filter-btn::before { content: "•"; margin-right: 1rem; margin-left: 0; }
    .filter-btn:first-of-type::before { content: "•"; margin-right: 1rem; margin-left: 0; }

    .filter-btn[data-topic="tech"]     { --topic-color: #22d3ee; }
    .filter-btn[data-topic="politics"] { --topic-color: #f87171; }
    .filter-btn[data-topic="nyc"]      { --topic-color: #2dd4bf; }
    .filter-btn[data-topic="culture"] { --topic-color: #fb923c; }
    .filter-btn[data-topic="media"]    { --topic-color: #a78bfa; }
    .filter-btn[data-topic="science"]  { --topic-color: #86efac; }

    .filter-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'Verlag', sans-serif;
    }
    .filter-meta #result-count:not(:empty) + #last-updated:not(:empty)::before {
      content: " · ";
    }

    /* ── LAYOUT ── */
    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      min-height: calc(100vh - 200px);
    }

    /* ── FEED ── */
    #feed { border-right: 1px solid var(--border); }

    /* ── CATEGORY SECTIONS ── */
    .category-section { border-bottom: 2px solid var(--border); }

    .category-heading {
      font-size: 0.68rem;
      font-family: 'Verlag', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      padding: 1rem 2rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── FEED ITEMS ── */
    .feed-item {
      position: relative;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .feed-item:last-child { border-bottom: none; }
    .feed-item:hover { background: linen; }

    [data-theme="dark"] .feed-item:hover { background: var(--surface); }

    .feed-item-link {
      position: absolute;
      inset: 0;
      z-index: 1;
      cursor: pointer;
    }

    .feed-item-inner {
      position: relative;
      z-index: 0;
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
    }

    .feed-item-text { flex: 1; min-width: 0; }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .source-badge {
      position: relative;
      z-index: 2;
      font-size: 0.7rem;
      font-family: 'Verlag', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.1rem 0.45rem;
      border-radius: 3px;
      cursor: pointer;
    }

    .source-badge:hover { opacity: 0.8; }

    .cat-newsletter { background: rgba(74,222,128,0.15);  color: var(--newsletter); }
    .cat-newsroom   { background: rgba(96,165,250,0.15);  color: var(--newsroom); }
    .cat-podcast    { background: rgba(245,158,11,0.15);  color: var(--podcast); }
    .cat-video      { background: rgba(192,132,252,0.15); color: var(--video); }

    .topic-tag {
      position: relative;
      z-index: 2;
      font-size: 0.65rem;
      font-family: 'Verlag', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      cursor: pointer;
      opacity: 0.85;
    }

    .topic-tag:hover { opacity: 1; }

    .topic-tech     { background: rgba(34,211,238,0.12);  color: #22d3ee; }
    .topic-politics { background: rgba(248,113,113,0.12); color: #f87171; }
    .topic-nyc      { background: rgba(45,212,191,0.12);  color: #2dd4bf; }
    .topic-culture  { background: rgba(251,146,60,0.12);  color: #fb923c; }
    .topic-media    { background: rgba(167,139,250,0.12); color: #a78bfa; }
    .topic-science  { background: rgba(134,239,172,0.12); color: #86efac; }

    .item-date {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'Verlag', sans-serif;
    }

    .item-title {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'GT Super', 'Georgia', serif;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    .item-title span { color: inherit; }
    .feed-item:hover .item-title span { color: var(--accent); }

    .item-snippet {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    #lightbox.open { display: flex; }
    #lightbox-backdrop {
      position: absolute;
      inset: 0;
    }
    #lightbox-box {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 85vh;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #lightbox-toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.8rem;
      font-family: 'Verlag', sans-serif;
    }
    #lightbox-open-tab {
      color: var(--accent);
      text-decoration: none;
    }
    #lightbox-open-tab:hover { text-decoration: underline; }
    #lightbox-paywall-note {
      color: var(--muted);
      font-size: 0.72rem;
    }
    #lightbox-close {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      border: none;
      background: var(--border);
      color: var(--text);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #lightbox-close:hover { background: var(--text); color: var(--bg); }
    .lightbox-embed-blocked {
      flex: 1;
      overflow-y: auto;
      background: #fff;
      color: #333;
      min-height: 0;
    }
    #lightbox-reader {
      max-width: 660px;
      margin: 0 auto;
      padding: 2rem 2.5rem;
      font-size: 1rem;
      line-height: 1.75;
    }
    #lightbox-reader-loading, #lightbox-reader-error {
      text-align: center;
      padding: 4rem 2rem;
      font-family: 'Verlag', sans-serif;
      color: #888;
    }
    #lightbox-reader-error a { color: var(--accent); text-decoration: none; }
    #lightbox-reader-error a:hover { text-decoration: underline; }
    #lightbox-reader-content img { max-width: 100%; height: auto; display: block; margin: 1rem 0; }
    #lightbox-reader-content h1, #lightbox-reader-content h2, #lightbox-reader-content h3 { font-family: 'GT Super', Georgia, serif; margin: 1.5rem 0 0.5rem; line-height: 1.3; }
    #lightbox-reader-content p { margin: 0 0 1rem; }
    #lightbox-reader-content a { color: var(--accent); }
    #lightbox-reader-content figure { margin: 1rem 0; }
    #lightbox-reader-content figcaption { font-size: 0.8rem; color: #888; margin-top: 0.35rem; }
    #lightbox-iframe {
      flex: 1;
      width: 100%;
      min-height: 0;
      border: none;
      border-radius: 0 0 8px 8px;
      background: #fff;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      padding: 1.5rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-heading {
      font-size: 0.68rem;
      font-family: 'Verlag', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.65rem;
    }

    .source-list { list-style: none; margin-bottom: 1.5rem; }

    .source-list-item {
      position: relative;
      margin: 0 0.25rem;
      padding: 0.5rem 1.75rem 0.5rem 0.6rem;
      border-radius: 8px 8px 0 0;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      box-shadow: 0 1px 0 var(--border);
      transition: background 0.1s;
    }
    .source-list-item:last-child { box-shadow: none; border-radius: 8px; }
    .source-list-item:hover,
    .source-list-item:has(+ .source-list-item:hover) {
      box-shadow: none;
    }
    .source-list-item:hover { background: linen; }
    [data-theme="dark"] .source-list-item:hover { background: var(--surface); }
    .source-list-item { cursor: pointer; }
    .source-list-name a { color: inherit; text-decoration: none; }
    .source-list-item:hover .source-list-name a { color: var(--accent); }
    .source-list-item-active .source-list-name a { color: var(--accent); }

    .source-list-item .source-remove {
      position: absolute;
      right: 0;
      top: 0.35rem;
      width: 1.25rem;
      height: 1.25rem;
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .source-list-item:hover .source-remove { opacity: 1; }
    .source-list-item .source-remove:hover { color: var(--accent); }

    .source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.45rem;
    }

    .source-list-name {
      font-size: 0.83rem;
      font-weight: 600;
    }

    .source-list-desc {
      font-size: 0.73rem;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ── STATES ── */
    #loading, #error-msg {
      padding: 4rem 2rem;
      text-align: center;
      font-family: 'Verlag', sans-serif;
      color: var(--muted);
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-msg {
      padding: 3rem 2rem;
      text-align: center;
      color: var(--muted);
      font-family: 'Verlag', sans-serif;
    }

    #failed-notice {
      background: rgba(255,60,0,0.08);
      border: 1px solid rgba(255,60,0,0.2);
      border-radius: 4px;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-family: 'Verlag', sans-serif;
      color: var(--muted);
      margin: 0.75rem 2rem 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      #sidebar { display: none; }
    }

    @media (max-width: 600px) {
      header, .filter-row { padding: 0.75rem 1rem; }
      .feed-item { padding: 1rem; }
      .item-title { font-size: 3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title-row">
    <div class="site-title"><span>Good news / bad times</span></div>
    <button id="theme-toggle" type="button" aria-label="Toggle dark mode"></button>
  </div>
</header>

<!-- Topic filter -->
<div class="filter-row">
  <button class="filter-btn active" data-topic="all"><span class="filter-btn-width" aria-hidden="true">All</span><span class="filter-btn-text">All</span></button>
  <button class="filter-btn" data-topic="nyc"><span class="filter-btn-width" aria-hidden="true">NYC</span><span class="filter-btn-text">NYC</span></button>
  <button class="filter-btn" data-topic="culture"><span class="filter-btn-width" aria-hidden="true">Culture</span><span class="filter-btn-text">Culture</span></button>
  <button class="filter-btn" data-topic="tech"><span class="filter-btn-width" aria-hidden="true">Tech</span><span class="filter-btn-text">Tech</span></button>
  <button class="filter-btn" data-topic="media"><span class="filter-btn-width" aria-hidden="true">Media</span><span class="filter-btn-text">Media</span></button>
  <button class="filter-btn" data-topic="science"><span class="filter-btn-width" aria-hidden="true">Science</span><span class="filter-btn-text">Science</span></button>
  <button class="filter-btn" data-topic="politics"><span class="filter-btn-width" aria-hidden="true">Politics</span><span class="filter-btn-text">Politics</span></button>
  <span class="filter-meta">
    <span id="result-count"></span>
    <span id="last-updated"></span>
  </span>
</div>

<main>
  <div id="feed">
    <div id="loading"><div class="spinner"></div>Fetching feeds…</div>
    <div id="error-msg" style="display:none"></div>
    <div id="items"></div>
  </div>

  <aside id="sidebar">
    <div id="sidebar-sources"></div>
  </aside>
</main>

<div id="lightbox" aria-hidden="true">
  <div id="lightbox-backdrop"></div>
  <div id="lightbox-box">
    <div id="lightbox-toolbar">
      <a id="lightbox-open-tab" href="#" target="_blank" rel="noopener">Open in new tab</a>
      <span id="lightbox-paywall-note">Hit a paywall? Open in new tab so your login applies.</span>
      <button id="lightbox-close" type="button" aria-label="Close">×</button>
    </div>
    <div id="lightbox-embed-blocked" class="lightbox-embed-blocked" style="display: none;">
      <div id="lightbox-reader">
        <div id="lightbox-reader-loading">Loading article…</div>
        <div id="lightbox-reader-error" style="display:none;">
          <p>Couldn’t load article content.</p>
          <p><a id="lightbox-open-tab-fallback" href="#" target="_blank" rel="noopener">Open in new tab</a> to read it.</p>
        </div>
        <div id="lightbox-reader-content" style="display:none;"></div>
      </div>
    </div>
    <iframe id="lightbox-iframe" title="Article"></iframe>
  </div>
</div>

<script>
  const TOPICS = {
    tech:     { label: 'Tech',     keywords: ['ai', 'a.i.', 'artificial intelligence', 'software', ' app ', 'apple', 'google', 'meta ', 'twitter', 'tiktok', 'algorithm', 'data', 'privacy', 'hack', 'cyber', 'startup', 'crypto', 'bitcoin', 'blockchain', 'openai', 'chatgpt', 'musk', 'silicon', 'internet', 'digital', 'platform', 'social media', 'youtube', 'instagram', 'facebook', 'microsoft', 'amazon', 'surveillance', 'big tech', 'antitrust', 'tech ', 'technology', 'robot', 'automation', 'section 230', 'deepfake', 'sam altman', 'anthropic'] },
    politics: { label: 'Politics', keywords: ['trump', 'biden', 'congress', 'senate', 'democrat', 'republican', 'election', 'government', 'federal', 'administration', 'president', 'white house', 'supreme court', 'doj', 'fbi', 'cia', 'epstein', 'maga', 'gop', 'legislation', 'tariff', 'immigration', 'border', 'ukraine', 'russia', 'israel', 'gaza', 'nato', 'doge', 'cabinet', 'political', 'policy', 'vote', 'ballot'] },
    nyc:      { label: 'NYC',      keywords: ['new york', 'nyc', 'brooklyn', 'manhattan', 'bronx', 'queens', 'staten island', 'subway', 'mta', 'new york city', 'the city'] },
    culture:  { label: 'Culture',  keywords: ['film', 'movie', 'music', 'art ', 'book', 'novel', ' tv ', 'comedy', 'celebrity', 'fashion', 'style', 'sports', 'nfl', 'nba', 'baseball', 'football', 'basketball', 'entertainment', 'hollywood', 'award', 'oscar', 'grammy', 'meme', 'viral', 'influencer', 'creator', 'fandom', 'culture', 'review', 'streaming show', 'podcast', 'album', 'tour', 'performance'] },
    media:    { label: 'Media',    keywords: ['newsletter', 'journalist', 'journalism', 'media ', 'newspaper', 'magazine', 'reporter', 'editorial', 'substack', 'cable news', 'msnbc', 'cnn', 'fox news', 'new york times', 'layoff', 'newsroom', 'publication', 'press', 'broadcast', 'anchor'] },
    science:  { label: 'Science',  keywords: ['science', 'research', 'study ', 'climate', 'environment', 'health', 'medicine', 'space', 'nasa', 'biology', 'chemistry', 'physics', 'discovery', 'species', 'ocean', 'planet', 'nature', 'animal', 'disease', 'drug', 'vaccine', 'gene', 'evolution'] },
  };

  const CAT_COLORS = {
    newsletter: 'var(--newsletter)',
    newsroom:   'var(--newsroom)',
    podcast:    'var(--podcast)',
    video:      'var(--video)',
  };

  const CAT_ORDER  = ['newsroom', 'newsletter', 'podcast', 'video'];
  const CAT_LABELS = { newsroom: 'Newsrooms', newsletter: 'Newsletters', podcast: 'Podcasts', video: 'Video' };

  const EXCLUDE_KEYWORDS = [
    'sports', 'nfl', 'nba', 'mlb', 'nhl', 'soccer', 'football', 'basketball', 'baseball', 'hockey',
    'quarterback', 'touchdown', 'playoffs', 'super bowl', 'world series', 'olympics', 'athlete',
    'celebrity', 'celebrities', 'kardashian', 'kanye', 'taylor swift', 'beyoncé', 'grammys', 'oscars',
    'red carpet', 'hollywood', 'starring', 'box office', 'award show', 'emmy', 'golden globe',
  ];

  function getTopics(item) {
    const text = ((item.title || '') + ' ' + (item.snippet || '')).toLowerCase();
    return Object.keys(TOPICS).filter(key =>
      TOPICS[key].keywords.some(kw => text.includes(kw))
    );
  }

  function isExcluded(item) {
    const text = ((item.title || '') + ' ' + (item.snippet || '')).toLowerCase();
    return EXCLUDE_KEYWORDS.some(kw => text.includes(kw));
  }

  let allItems   = [];
  let allSources = [];
  let activeTopic  = 'all';
  let activeSource = '';

  const HIDDEN_SOURCES_KEY = 'wtaf-hidden-sources';
  function getHiddenSourceNames() {
    try {
      const j = localStorage.getItem(HIDDEN_SOURCES_KEY);
      return j ? JSON.parse(j) : [];
    } catch { return []; }
  }
  function setHiddenSourceNames(arr) {
    localStorage.setItem(HIDDEN_SOURCES_KEY, JSON.stringify(arr));
  }

  const TRASH_ICON = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

  // ── Theme
  const THEME_KEY = 'wtaf-theme';
  function getTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'dark' || saved === 'light') return saved;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  const sunIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>';
  const moonIcon = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
    const toggle = document.getElementById('theme-toggle');
    toggle.innerHTML = theme === 'dark' ? sunIcon : moonIcon;
    toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    localStorage.setItem(THEME_KEY, theme);
  }
  applyTheme(getTheme());
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(next);
  });

  // ── Sidebar + source select
  async function loadSources() {
    try {
      const res = await fetch('/api/sources');
      allSources = await res.json();
      buildSidebar();
    } catch (e) {
      console.error('Could not load sources', e);
    }
  }

  function buildSidebar() {
    const hidden = getHiddenSourceNames();
    const section = document.getElementById('sidebar-sources');

    const sourceRow = (name, desc, url, cat) => {
      const active = activeSource === name ? ' source-list-item-active' : '';
      return `
        <li class="source-list-item${active}" data-source-name="${escHtml(name)}" role="button" tabindex="0">
          <span class="source-dot" style="background:${CAT_COLORS[cat]}"></span>
          <div>
            <div class="source-list-name"><a href="${escHtml(url)}" target="_blank" rel="noopener">${escHtml(name)}</a></div>
            <div class="source-list-desc">${desc}</div>
          </div>
          <button type="button" class="source-remove" title="Remove source" aria-label="Remove source">${TRASH_ICON}</button>
        </li>
      `;
    };

    const html = CAT_ORDER.map(cat => {
      const sources = allSources.filter(s => s.category === cat && !hidden.includes(s.name));
      if (!sources.length) return '';
      return `
        <div>
          <div class="sidebar-heading">${CAT_LABELS[cat]}</div>
          <ul class="source-list">
            ${sources.map(s => sourceRow(s.name, s.description, s.url, cat)).join('')}
          </ul>
        </div>
      `;
    }).join('');
    section.innerHTML = html;
  }

  document.getElementById('sidebar-sources').addEventListener('click', (e) => {
    const removeBtn = e.target.closest('.source-remove');
    if (removeBtn) {
      e.preventDefault();
      e.stopPropagation();
      const item = removeBtn.closest('.source-list-item');
      const name = item?.dataset.sourceName;
      if (name) {
        const list = getHiddenSourceNames();
        if (!list.includes(name)) {
          setHiddenSourceNames([...list, name]);
          if (activeSource === name) activeSource = '';
          buildSidebar();
          renderItems();
        }
      }
      return;
    }
    if (e.target.closest('.source-list-name a')) return;
    const item = e.target.closest('.source-list-item');
    if (item) {
      e.preventDefault();
      const name = item.dataset.sourceName;
      if (name) filterBySource(name);
    }
  });

  document.getElementById('sidebar-sources').addEventListener('keydown', (e) => {
    if (e.target.closest('.source-remove')) return;
    const item = e.target.closest('.source-list-item');
    if (!item || (e.key !== 'Enter' && e.key !== ' ')) return;
    e.preventDefault();
    const name = item.dataset.sourceName;
    if (name) filterBySource(name);
  });

  // ── Fetch
  async function loadFeed(force = false) {
    if (force) {
      allItems = [];
      document.getElementById('items').innerHTML = '';
    }
    const loading = document.getElementById('loading');
    const errMsg  = document.getElementById('error-msg');

    loading.style.display = 'block';
    errMsg.style.display  = 'none';

    try {
      const url = force ? '/api/feeds?bust=' + Date.now() : '/api/feeds';
      const res  = await fetch(url);
      const data = await res.json();
      allItems   = data.items || [];

      const hidden = getHiddenSourceNames();
      allItems = allItems.filter(item => !hidden.includes(item.source));

      document.getElementById('last-updated').textContent =
        `Updated ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

      const existing = document.getElementById('failed-notice');
      if (existing) existing.remove();
      if (data.failed?.length) {
        const notice = document.createElement('div');
        notice.id = 'failed-notice';
        notice.textContent = 'Couldn\'t reach: ' + data.failed.join(', ');
        document.querySelector('main').before(notice);
      }

      renderItems();
    } catch (e) {
      errMsg.style.display = 'block';
      errMsg.textContent   = 'Failed to load feeds. Is the server running?';
    } finally {
      loading.style.display = 'none';
    }
  }

  // ── Render
  function renderItem(item) {
    const itemTopics = getTopics(item);
    const topicTags  = itemTopics.map(t =>
      `<span class="topic-tag topic-${t}" onclick="filterByTopic('${t}')" title="Filter to ${TOPICS[t].label}">${TOPICS[t].label}</span>`
    ).join('');

    const linkEsc = escHtml(item.link).replace(/"/g, '&quot;');
    return `
      <article class="feed-item" data-item-link="${linkEsc}">
        <div class="feed-item-link" role="button" tabindex="0" data-open-lightbox aria-label="Read article"></div>
        <div class="feed-item-inner">
          <div class="feed-item-text">
            <div class="item-meta">
              <span
                class="source-badge cat-${item.category}"
                onclick="filterBySource('${item.source.replace(/'/g, "\\'")}')"
                title="Filter to ${item.source}"
              >${item.source}</span>
              ${topicTags}
              ${item.date ? `<span class="item-date">${formatDate(item.date)}</span>` : ''}
            </div>
            <div class="item-title">
              <span>${escHtml(item.title)}</span>
            </div>
            ${item.snippet ? `<div class="item-snippet">${escHtml(item.snippet)}</div>` : ''}
          </div>
        </div>
      </article>
    `;
  }

  function renderItems() {
    const filtered = allItems.filter(item => {
      if (isExcluded(item)) return false;
      if (activeSource && item.source !== activeSource) return false;
      if (activeTopic !== 'all' && !getTopics(item).includes(activeTopic)) return false;
      return true;
    });

    document.getElementById('result-count').textContent = filtered.length
      ? `${filtered.length.toLocaleString()} item${filtered.length === 1 ? '' : 's'}`
      : '';

    const container = document.getElementById('items');

    if (!filtered.length) {
      container.innerHTML = '<div class="empty-msg">No items match your filters.</div>';
      return;
    }

    // Group by category, sorted by recency within each group
    const grouped = {};
    CAT_ORDER.forEach(cat => { grouped[cat] = []; });
    filtered.forEach(item => {
      if (grouped[item.category]) grouped[item.category].push(item);
    });

    container.innerHTML = CAT_ORDER
      .filter(cat => grouped[cat].length > 0)
      .map(cat => `
        <div class="category-section">
          <h2 class="category-heading">${CAT_LABELS[cat]}</h2>
          ${grouped[cat].map(renderItem).join('')}
        </div>
      `)
      .join('');
  }

  // ── Filter handlers
  function filterBySource(name) {
    activeSource = activeSource === name ? '' : name;
    buildSidebar();
    renderItems();
  }

  function filterByTopic(topic) {
    document.querySelectorAll('.filter-btn[data-topic]').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.filter-btn[data-topic="${topic}"]`);
    if (btn) btn.classList.add('active');
    activeTopic = topic;
    renderItems();
  }

  document.querySelectorAll('.filter-btn[data-topic]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-topic]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTopic = btn.dataset.topic;
      renderItems();
    });
  });

  // ── Lightbox
  const lightbox = document.getElementById('lightbox');
  const lightboxIframe = document.getElementById('lightbox-iframe');
  const lightboxEmbedBlocked = document.getElementById('lightbox-embed-blocked');
  const lightboxClose = document.getElementById('lightbox-close');
  const lightboxBackdrop = document.getElementById('lightbox-backdrop');

  const EMBED_BLOCKED_HOSTS = ['dropsitenews.com', 'www.dropsitenews.com', 'apod.nasa.gov', 'technologyreview.com', 'www.technologyreview.com'];

  function openLightbox(url) {
    let host = '';
    try { host = new URL(url).hostname.toLowerCase(); } catch (_) {}
    const blocked = EMBED_BLOCKED_HOSTS.some(h => host === h || host.endsWith('.' + h));

    const openTabLink = document.getElementById('lightbox-open-tab');
    const openTabFallback = document.getElementById('lightbox-open-tab-fallback');
    openTabLink.href = url;
    openTabFallback.href = url;

    if (blocked) {
      lightboxIframe.src = 'about:blank';
      lightboxIframe.style.display = 'none';
      lightboxEmbedBlocked.style.display = 'block';
      const readerLoading = document.getElementById('lightbox-reader-loading');
      const readerError   = document.getElementById('lightbox-reader-error');
      const readerContent = document.getElementById('lightbox-reader-content');
      readerLoading.style.display = 'block';
      readerError.style.display   = 'none';
      readerContent.style.display = 'none';
      readerContent.innerHTML     = '';
      fetch('/api/article?url=' + encodeURIComponent(url))
        .then(r => r.json())
        .then(data => {
          if (!data.content) throw new Error('no content');
          readerContent.innerHTML     = data.content;
          readerLoading.style.display = 'none';
          readerContent.style.display = 'block';
        })
        .catch(() => {
          readerLoading.style.display = 'none';
          readerError.style.display   = 'block';
        });
    } else {
      lightboxIframe.src = url;
      lightboxIframe.style.display = 'block';
      lightboxEmbedBlocked.style.display = 'none';
    }
    lightbox.classList.add('open');
    lightbox.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lightbox.setAttribute('aria-hidden', 'true');
    lightboxIframe.src = '';
    lightboxIframe.style.display = 'block';
    lightboxEmbedBlocked.style.display = 'none';
    document.getElementById('lightbox-reader-content').innerHTML = '';
    document.body.style.overflow = '';
  }

  document.getElementById('items').addEventListener('click', (e) => {
    const trigger = e.target.closest('.feed-item-link[data-open-lightbox]');
    if (!trigger) return;
    e.preventDefault();
    const article = trigger.closest('.feed-item');
    const url = article?.dataset.itemLink;
    if (url) openLightbox(url);
  });

  document.getElementById('items').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const trigger = e.target.closest('.feed-item-link[data-open-lightbox]');
    if (!trigger) return;
    e.preventDefault();
    const article = trigger.closest('.feed-item');
    const url = article?.dataset.itemLink;
    if (url) openLightbox(url);
  });

  lightboxClose.addEventListener('click', closeLightbox);
  lightboxBackdrop.addEventListener('click', closeLightbox);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
  });

  // ── Helpers
  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const diff  = Date.now() - d;
    const mins  = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days  = Math.floor(diff / 86400000);
    if (mins  <  1) return 'just now';
    if (mins  < 60) return `${mins}m ago`;
    if (hours < 24) return `${hours}h ago`;
    if (days  <  7) return `${days}d ago`;
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Init
  loadSources();
  loadFeed();
</script>
</body>
</html>
