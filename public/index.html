<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WTAF — The Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #ff3c00;
      --newsletter: #4ade80;
      --newsroom: #60a5fa;
      --podcast: #f59e0b;
      --video: #c084fc;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .site-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-family: 'Arial Black', sans-serif;
      text-transform: uppercase;
    }

    .site-title span { color: var(--accent); }

    .site-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      font-family: sans-serif;
    }

    .header-meta {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: sans-serif;
      text-align: right;
    }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: sans-serif;
      margin-top: 0.25rem;
      transition: border-color 0.15s, color 0.15s;
    }

    #refresh-btn:hover { border-color: var(--text); color: var(--text); }
    #refresh-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── FILTERS ── */
    .filters {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-size: 0.75rem;
      font-family: sans-serif;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 0.25rem;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: sans-serif;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--text); color: var(--text); }

    .filter-btn.active {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
      font-weight: 600;
    }

    .filter-btn[data-cat="newsletter"].active { background: var(--newsletter); border-color: var(--newsletter); color: #000; }
    .filter-btn[data-cat="newsroom"].active   { background: var(--newsroom);   border-color: var(--newsroom);   color: #000; }
    .filter-btn[data-cat="podcast"].active    { background: var(--podcast);    border-color: var(--podcast);    color: #000; }
    .filter-btn[data-cat="video"].active      { background: var(--video);      border-color: var(--video);      color: #000; }

    /* ── SOURCE FILTER ── */
    .source-filter-wrap {
      padding: 0.75rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    #source-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: sans-serif;
      cursor: pointer;
    }

    #search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: sans-serif;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }

    #search-input:focus { border-color: var(--muted); }
    #search-input::placeholder { color: var(--muted); }

    #result-count {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: sans-serif;
    }

    /* ── LAYOUT ── */
    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      min-height: calc(100vh - 200px);
    }

    /* ── FEED ── */
    #feed {
      border-right: 1px solid var(--border);
      padding: 0;
    }

    .feed-item {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .feed-item:hover { background: var(--surface); }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
    }

    .source-badge {
      font-size: 0.72rem;
      font-family: sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.1rem 0.5rem;
      border-radius: 3px;
      cursor: pointer;
    }

    .source-badge:hover { opacity: 0.8; }

    .cat-newsletter { background: rgba(74,222,128,0.15); color: var(--newsletter); }
    .cat-newsroom   { background: rgba(96,165,250,0.15); color: var(--newsroom); }
    .cat-podcast    { background: rgba(245,158,11,0.15);  color: var(--podcast); }
    .cat-video      { background: rgba(192,132,252,0.15); color: var(--video); }

    .item-date {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: sans-serif;
    }

    .item-title {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.35rem;
    }

    .item-title a:hover { color: var(--accent); text-decoration: none; }

    .item-snippet {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      padding: 1.5rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-section {
      margin-bottom: 2rem;
    }

    .sidebar-heading {
      font-size: 0.7rem;
      font-family: sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .source-list {
      list-style: none;
    }

    .source-list-item {
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .source-list-item:last-child { border-bottom: none; }

    .source-list-name {
      font-size: 0.85rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    .source-list-name a:hover { color: var(--accent); }

    .source-list-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.4rem;
    }

    /* ── STATES ── */
    #loading, #error-msg {
      padding: 4rem 2rem;
      text-align: center;
      font-family: sans-serif;
      color: var(--muted);
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-msg {
      padding: 3rem 2rem;
      text-align: center;
      color: var(--muted);
      font-family: sans-serif;
    }

    /* ── FAILED NOTICE ── */
    #failed-notice {
      background: rgba(255,60,0,0.08);
      border: 1px solid rgba(255,60,0,0.2);
      border-radius: 4px;
      padding: 0.6rem 1rem;
      font-size: 0.78rem;
      font-family: sans-serif;
      color: var(--muted);
      margin: 1rem 2rem 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      #sidebar { display: none; }
    }

    @media (max-width: 600px) {
      header, .filters, .source-filter-wrap { padding: 1rem; }
      .feed-item { padding: 1rem; }
      #search-input { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="site-title"><span>WTAF</span> — The Feed</div>
    <div class="site-subtitle">Your weird little flotilla, aggregated.</div>
  </div>
  <div class="header-meta">
    <div id="last-updated"></div>
    <button id="refresh-btn" onclick="loadFeed(true)">Refresh</button>
  </div>
</header>

<div class="filters">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="newsletter">Newsletters</button>
  <button class="filter-btn" data-cat="newsroom">Newsrooms</button>
  <button class="filter-btn" data-cat="podcast">Podcasts</button>
  <button class="filter-btn" data-cat="video">Video</button>
</div>

<div class="source-filter-wrap">
  <select id="source-select">
    <option value="">All sources</option>
  </select>
  <input id="search-input" type="search" placeholder="Search headlines…" autocomplete="off">
  <span id="result-count"></span>
</div>

<main>
  <div id="feed">
    <div id="loading">
      <div class="spinner"></div>
      Fetching feeds…
    </div>
    <div id="error-msg" style="display:none"></div>
    <div id="items"></div>
  </div>

  <aside id="sidebar">
    <div class="sidebar-section" id="sidebar-sources"></div>
  </aside>
</main>

<script>
  const CAT_COLORS = {
    newsletter: 'var(--newsletter)',
    newsroom:   'var(--newsroom)',
    podcast:    'var(--podcast)',
    video:      'var(--video)',
  };

  let allItems = [];
  let allSources = [];
  let activeCategory = 'all';
  let activeSource = '';
  let searchQuery = '';

  // ── Fetch all sources for sidebar
  async function loadSources() {
    try {
      const res = await fetch('/api/sources');
      allSources = await res.json();
      buildSidebar();
      buildSourceSelect();
    } catch (e) {
      console.error('Could not load sources', e);
    }
  }

  function buildSidebar() {
    const section = document.getElementById('sidebar-sources');
    const cats = ['newsroom', 'newsletter', 'podcast', 'video'];
    const labels = { newsroom: 'Newsrooms', newsletter: 'Newsletters', podcast: 'Podcasts', video: 'Video' };

    section.innerHTML = cats.map(cat => {
      const sources = allSources.filter(s => s.category === cat);
      if (!sources.length) return '';
      return `
        <div style="margin-bottom:1.5rem">
          <div class="sidebar-heading">${labels[cat]}</div>
          <ul class="source-list">
            ${sources.map(s => `
              <li class="source-list-item">
                <span class="source-dot" style="background:${CAT_COLORS[cat]}"></span>
                <div>
                  <span class="source-list-name"><a href="${s.url}" target="_blank" rel="noopener">${s.name}</a></span>
                  <div class="source-list-desc">${s.description}</div>
                </div>
              </li>
            `).join('')}
          </ul>
        </div>
      `;
    }).join('');
  }

  function buildSourceSelect() {
    const sel = document.getElementById('source-select');
    const feedSources = allSources.filter(s => s.hasRss);
    const cats = ['newsroom', 'newsletter', 'podcast'];
    const labels = { newsroom: 'Newsrooms', newsletter: 'Newsletters', podcast: 'Podcasts' };

    cats.forEach(cat => {
      const sources = feedSources.filter(s => s.category === cat);
      if (!sources.length) return;
      const og = document.createElement('optgroup');
      og.label = labels[cat];
      sources.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = s.name;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
  }

  // ── Fetch feed items
  async function loadFeed(force = false) {
    if (force) {
      allItems = [];
      document.getElementById('items').innerHTML = '';
    }
    const loading = document.getElementById('loading');
    const errMsg  = document.getElementById('error-msg');
    const btn     = document.getElementById('refresh-btn');

    loading.style.display = 'block';
    errMsg.style.display  = 'none';
    btn.disabled = true;
    btn.textContent = 'Loading…';

    const url = force ? '/api/feeds?bust=' + Date.now() : '/api/feeds';

    try {
      const res  = await fetch(url);
      const data = await res.json();
      allItems   = data.items || [];

      // Show last-updated
      const now = new Date();
      document.getElementById('last-updated').textContent =
        `Updated ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

      // Show failed feeds notice
      const existing = document.getElementById('failed-notice');
      if (existing) existing.remove();
      if (data.failed && data.failed.length > 0) {
        const notice = document.createElement('div');
        notice.id = 'failed-notice';
        notice.textContent = `Couldn't reach: ${data.failed.join(', ')}`;
        document.querySelector('main').before(notice);
      }

      renderItems();
    } catch (e) {
      errMsg.style.display = 'block';
      errMsg.textContent   = 'Failed to load feeds. Is the server running?';
    } finally {
      loading.style.display = 'none';
      btn.disabled   = false;
      btn.textContent = 'Refresh';
    }
  }

  // ── Render
  function renderItems() {
    const q = searchQuery.toLowerCase();

    const filtered = allItems.filter(item => {
      if (activeCategory !== 'all' && item.category !== activeCategory) return false;
      if (activeSource && item.source !== activeSource) return false;
      if (q && !item.title.toLowerCase().includes(q) && !(item.snippet || '').toLowerCase().includes(q)) return false;
      return true;
    });

    const count = document.getElementById('result-count');
    count.textContent = filtered.length
      ? `${filtered.length.toLocaleString()} item${filtered.length === 1 ? '' : 's'}`
      : '';

    const container = document.getElementById('items');

    if (!filtered.length) {
      container.innerHTML = '<div class="empty-msg">No items match your filters.</div>';
      return;
    }

    container.innerHTML = filtered.map(item => `
      <article class="feed-item">
        <div class="item-meta">
          <span
            class="source-badge cat-${item.category}"
            onclick="filterBySource('${item.source.replace(/'/g, "\\'")}')"
            title="Filter to ${item.source}"
          >${item.source}</span>
          ${item.date ? `<span class="item-date">${formatDate(item.date)}</span>` : ''}
        </div>
        <div class="item-title">
          <a href="${item.link}" target="_blank" rel="noopener">${escHtml(item.title)}</a>
        </div>
        ${item.snippet ? `<div class="item-snippet">${escHtml(item.snippet)}</div>` : ''}
      </article>
    `).join('');
  }

  // ── Filters
  function filterBySource(name) {
    const sel = document.getElementById('source-select');
    sel.value   = name;
    activeSource = name;
    renderItems();
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      document.getElementById('source-select').value = '';
      activeSource = '';
      renderItems();
    });
  });

  document.getElementById('source-select').addEventListener('change', e => {
    activeSource = e.target.value;
    renderItems();
  });

  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      renderItems();
    }, 200);
  });

  // ── Helpers
  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const now = new Date();
    const diff = now - d;
    const mins  = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days  = Math.floor(diff / 86400000);
    if (mins  <  1)  return 'just now';
    if (mins  < 60)  return `${mins}m ago`;
    if (hours < 24)  return `${hours}h ago`;
    if (days  <  7)  return `${days}d ago`;
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Init
  loadSources();
  loadFeed();
</script>
</body>
</html>
