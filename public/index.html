<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We're so f-cked</title>
  <style>
    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Light.woff') format('woff');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Bold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Light-Italic.woff') format('woff');
      font-weight: 300;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Regular-Italic.woff') format('woff');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Medium-Italic.woff') format('woff');
      font-weight: 500;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super';
      src: url('/fonts/GT-Super-Web/GT-Super-Display-Bold-Italic.woff') format('woff');
      font-weight: 700;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super Text';
      src: url('/fonts/GT-Super-Web/GT-Super-Text-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super Text';
      src: url('/fonts/GT-Super-Web/GT-Super-Text-Regular-Italic.woff') format('woff');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super Text';
      src: url('/fonts/GT-Super-Web/GT-Super-Text-Medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'GT Super Text';
      src: url('/fonts/GT-Super-Web/GT-Super-Text-Bold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Verlag';
      src: url('/fonts/Verlag/Verlag-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Verlag';
      src: url('/fonts/Verlag/Verlag-Bold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: antiquewhite;
      --surface: #e0dcd4;
      --border: #c9c4b8;
      --text: #2c2424;
      --muted: #666;
      --accent: #ff3c00;
      --newsletter: #4ade80;
      --newsroom: #60a5fa;
      --podcast: #f59e0b;
      --video: #c084fc;
    }

    [data-theme="dark"] {
      --bg: #0c0923;
      --surface: #03011f;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #bebebe;
      --accent: #ff5a28;
      --newsletter: #4ade80;
      --newsroom: #60a5fa;
      --podcast: #f59e0b;
      --video: #c084fc;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'GT Super Text', 'Georgia', serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── HEADER ── */
    header {
      padding: 1rem 2rem 0.4rem 2rem;
      padding-right: calc(320px + 2rem); /* leave room for sidebar */
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .header-title-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem 0.75rem;
      flex-wrap: wrap;
    }

    .site-title-wrap {
      display: inline-block;
    }

    /* Title with toggle inline so it flows like a character */
    .site-title {
      display: inline;
      font-size: 12rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      font-family: 'GT Super', sans-serif;
      text-transform: titlecase;
      font-style: italic;
      line-height: 0.9;
      color: var(--text);
    }

    .site-title span { color: var(--text); }

    /* Toggle: inline like an asterisk, moves with title on any screen size */
    #theme-toggle {
      display: inline-flex;
      font-size: 1rem; /* don't inherit 12rem from .site-title */
      vertical-align: top;
      margin-left: 0.12em;
      background: none;
      border: none;
      border-radius: 50%;
      padding: 0.35rem;
      cursor: pointer;
      color: var(--text);
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, color 0.2s;
    }
    #theme-toggle:hover {
      transform: translateY(-2px);
      color: var(--accent);
    }
    #theme-toggle svg { width: 1.35rem; height: 1.35rem; }

    /* Subtitle: separate from toggle, flows inline and can wrap */
    #subtitle {
      display: inline;
      font-size: 1.15rem;
      line-height: 1.4;
      color: var(--muted);
      font-family: 'Verlag', sans-serif;
      font-style: normal;
      font-weight: 400;
      vertical-align: baseline;
    }

    #menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 1.5rem;
      padding: 0.25rem 0.4rem;
      line-height: 1;
      border-radius: 4px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #menu-btn:hover { background: var(--surface); }

    /* ── BURGER MENU ── */
    #menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 1001;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #menu-overlay.open { opacity: 1; pointer-events: auto; }

    #menu-panel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      max-height: 80vh;
      z-index: 1002;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      overflow-y: auto;
      transform: translateY(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }
    #menu-panel.open { transform: translateY(0); }

    #menu-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 1;
      gap: 0.75rem;
    }
    #menu-meta {
      font-size: 0.72rem;
      font-family: 'Verlag', sans-serif;
      color: var(--muted);
      display: flex;
      gap: 0.4rem;
      flex: 1;
      min-width: 0;
    }
    #menu-meta #last-updated { white-space: nowrap; }

    #menu-close {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      border: none;
      background: var(--border);
      color: var(--text);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #menu-close:hover { background: var(--text); color: var(--bg); }

    .menu-section-label {
      font-size: 0.68rem;
      font-family: 'Verlag', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      padding: 1rem 1.25rem 0.4rem;
    }

    #menu-ticker-section { display: none; }
    #menu-ticker-list {
      padding: 0 0.75rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .menu-ticker-btn {
      background: none;
      border: none;
      text-align: left;
      font: inherit;
      font-size: 0.85rem;
      font-family: 'Verlag', sans-serif;
      color: var(--text);
      padding: 0.4rem 0.5rem;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.1s;
      line-height: 1.4;
    }
    .menu-ticker-btn:hover { background: var(--surface); }
    .menu-ticker-btn.ticker-active { color: var(--accent); background: var(--surface); }

    #menu-filter-topics {
      padding: 0 0.75rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    #menu-filter-topics .filter-btn {
      display: block;
      width: 100%;
      text-align: left;
      border-radius: 5px;
      padding: 0.4rem 0.5rem 0.4rem 1.75rem;
    }
    #menu-filter-topics .filter-btn::before { left: 0.5rem; }
    #menu-filter-topics .filter-btn .filter-btn-text { left: 1.75rem; }

    #menu-sources-inner {
      padding: 0 1.25rem 1.5rem;
    }

    /* ── TOPIC FILTER ── */
    /* ── TICKER ── */
    #ticker-bar {
      display: flex;
      align-items: stretch;
      height: 2.25rem;
      overflow: hidden;
      /* border-bottom: 2px solid var(--accent); */
      /* background: #111; */
      color: var(--text);
      font-family: 'Gt Super';
      font-size: 0.78rem;
      /* font-weight: 700; */
      letter-spacing: 0.07em;
      /* text-transform: uppercase; */
    }
    /* [data-theme="dark"] #ticker-bar { background: #000; } */

    #ticker-label {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 1rem;
      background: var(--accent);
      color: var(--text);
      letter-spacing: 0.12em;
    }

    #ticker-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #ticker-bar:hover #ticker-track { animation-play-state: paused; }

    #ticker-track {
      display: inline-block;
      white-space: nowrap;
      will-change: transform;
      animation: ticker-scroll linear infinite;
    }

    @keyframes ticker-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(var(--scroll-pct, -50%)); }
    }

    .ticker-item {
      cursor: pointer;
      transition: color 0.15s;
    }
    .ticker-item:hover { color: var(--accent); }
    .ticker-item.ticker-active {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .ticker-sep { opacity: 0.45; margin: 0 0.3em; }

    .filter-row {
      position: relative;
      padding: 0.4rem 2rem 0.75rem;
      padding-right: calc(320px + 2rem); /* leave room for sidebar */
      border-bottom: none;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-row::after {
      content: "";
      position: absolute;
      left: 0;
      right: 320px; /* stop at sidebar edge */
      bottom: 0;
      height: 1px;
      background: var(--border);
      pointer-events: none;
    }

    .filter-btn {
      --topic-color: var(--text);
      position: relative;
      background: none;
      border: none;
      color: var(--text);
      padding: 0.35rem 0 0.35rem 1.5rem;
      cursor: pointer;
      font-size: 1.25rem;
      font-family: 'Verlag', sans-serif;
      font-weight: 400;
      font-style: normal;
      transition: font-style 0.15s;
      white-space: nowrap;
      text-decoration: none;
    }
    .filter-btn::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--topic-color);
      font-weight: 700;
    }
    /* Invisible italic copy reserves width so hover doesn’t shift layout */
    .filter-btn .filter-btn-width {
      display: inline-block;
      font-style: italic;
      visibility: hidden;
      white-space: nowrap;
      pointer-events: none;
    }
    .filter-btn .filter-btn-text {
      position: absolute;
      left: 1.5rem;
      top: 0.35rem;
      font-style: normal;
      transition: font-style 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 0 0 transparent;
    }
    .filter-btn:hover .filter-btn-text {
      font-style: italic;
      box-shadow: 0 3px 0 0 var(--topic-color);
    }
    .filter-btn:hover::before { font-style: italic; }
    .filter-btn.active { color: var(--topic-color); }
    .filter-btn.active .filter-btn-text { box-shadow: 0 3px 0 0 var(--topic-color); }

    .filter-btn + .filter-btn::before { content: "•"; margin-right: 1rem; margin-left: 0; }
    .filter-btn:first-of-type::before { content: "•"; margin-right: 1rem; margin-left: 0; }

    .filter-btn[data-topic="tech"]     { --topic-color: #22d3ee; }
    .filter-btn[data-topic="politics"] { --topic-color: #f87171; }
    .filter-btn[data-topic="nyc"]      { --topic-color: #2dd4bf; }
    .filter-btn[data-topic="culture"] { --topic-color: #fb923c; }
    .filter-btn[data-topic="media"]    { --topic-color: #a78bfa; }
    .filter-btn[data-topic="science"]  { --topic-color: #86efac; }

    .filter-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'Verlag', sans-serif;
    }
    .filter-meta #result-count:not(:empty) + #last-updated:not(:empty)::before {
      content: " · ";
    }

    /* ── LAYOUT ── */
    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      min-height: calc(100vh - 200px);
    }

    /* Full-height hairline at sidebar edge */
    body::before {
      content: "";
      position: fixed;
      top: 0; bottom: 0; right: 320px;
      width: 1px;
      background: var(--border);
      pointer-events: none;
    }

    /* ── FEED ── */
    #feed { border-right: none; }

    /* ── CATEGORY SECTIONS ── */
    .category-section { border-bottom: 2px solid var(--border); }

    .category-heading {
      font-size: 0.68rem;
      font-family: 'Verlag', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      padding: 1rem 2rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── FEED ITEMS ── */
    .feed-item {
      position: relative;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .feed-item:last-child { border-bottom: none; }
    .feed-item:hover { background: linen; }

    [data-theme="dark"] .feed-item:hover { background: var(--surface); }

    .feed-item { cursor: pointer; }

    .feed-item-link {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .feed-item-inner {
      position: relative;
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
    }

    .feed-item-text { flex: 1; min-width: 0; }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
      flex-wrap: nowrap;
    }

    .item-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.1rem;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }
    .item-action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.5rem;
      height: 1.5rem;
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .feed-item:hover .item-action-btn { opacity: 1; }
    .item-action-btn:hover { color: var(--text); }
    .item-action-btn.item-saved { color: var(--accent); opacity: 1; }
    #saved-filter-btn { --topic-color: var(--accent); }
    #read-filter-btn, #menu-read-filter-btn { --topic-color: #94a3b8; }

    .source-badge {
      position: relative;
      z-index: 2;
      font-size: 0.7rem;
      font-family: 'Verlag', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.1rem 0.45rem;
      border-radius: 3px;
      cursor: pointer;
    }

    .source-badge:hover { opacity: 0.8; }

    .cat-newsletter { background: rgba(74,222,128,0.15);  color: var(--newsletter); }
    .cat-newsroom   { background: rgba(96,165,250,0.15);  color: var(--newsroom); }
    .cat-podcast    { background: rgba(245,158,11,0.15);  color: var(--podcast); }
    .cat-video      { background: rgba(192,132,252,0.15); color: var(--video); }

    .topic-tag {
      position: relative;
      z-index: 2;
      font-size: 0.65rem;
      font-family: 'Verlag', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      cursor: pointer;
      opacity: 0.85;
    }

    .topic-tag:hover { opacity: 1; }

    .topic-tech     { background: rgba(34,211,238,0.12);  color: #22d3ee; }
    .topic-politics { background: rgba(248,113,113,0.12); color: #f87171; }
    .topic-nyc      { background: rgba(45,212,191,0.12);  color: #2dd4bf; }
    .topic-culture  { background: rgba(251,146,60,0.12);  color: #fb923c; }
    .topic-media    { background: rgba(167,139,250,0.12); color: #a78bfa; }
    .topic-science  { background: rgba(134,239,172,0.12); color: #86efac; }

    .item-date {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'Verlag', sans-serif;
    }

    .item-title {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'GT Super', 'Georgia', serif;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    .item-title span { color: inherit; }
    .feed-item:hover .item-title span { color: var(--accent); }

    .item-snippet {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
    }
    #lightbox.open {
      pointer-events: auto;
    }
    #lightbox-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.3s;
    }
    #lightbox.open #lightbox-backdrop {
      opacity: 1;
    }
    #lightbox-box {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: clamp(320px, 55vw, 860px);
      background: #fff;
      box-shadow: -4px 0 32px rgba(0,0,0,0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #lightbox.open #lightbox-box {
      transform: translateX(0);
    }
    @media (max-width: 600px) {
      #lightbox-box {
        width: 100%;
      }
    }
    #lightbox-toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.8rem;
      font-family: 'Verlag', sans-serif;
    }
    #lightbox-open-tab {
      color: var(--accent);
      text-decoration: none;
    }
    #lightbox-open-tab:hover { text-decoration: underline; }
    #lightbox-reader-view-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: var(--accent);
      font: inherit;
      font-size: 0.8rem;
      font-family: 'Verlag', sans-serif;
    }
    #lightbox-reader-view-btn:hover { text-decoration: underline; }
    #lightbox-paywall-note {
      color: var(--muted);
      font-size: 0.72rem;
    }
    #lightbox-close {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      border: none;
      background: var(--border);
      color: var(--text);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #lightbox-close:hover { background: var(--text); color: var(--bg); }
    .lightbox-embed-blocked {
      flex: 1;
      overflow-y: auto;
      background: #fff;
      color: #333;
      min-height: 0;
    }
    #lightbox-reader {
      max-width: 660px;
      margin: 0 auto;
      padding: 2rem 2.5rem;
      font-size: 1rem;
      line-height: 1.75;
    }
    #lightbox-reader-loading, #lightbox-reader-error {
      text-align: center;
      padding: 4rem 2rem;
      font-family: 'Verlag', sans-serif;
      color: #888;
    }
    #lightbox-reader-error a { color: var(--accent); text-decoration: none; }
    #lightbox-reader-error a:hover { text-decoration: underline; }
    #lightbox-reader-content img { max-width: 100%; height: auto; display: block; margin: 1rem 0; }
    #lightbox-reader-content h1, #lightbox-reader-content h2, #lightbox-reader-content h3 { font-family: 'GT Super', Georgia, serif; margin: 1.5rem 0 0.5rem; line-height: 1.3; }
    #lightbox-reader-content p { margin: 0 0 1rem; }
    #lightbox-reader-content a { color: var(--accent); }
    #lightbox-reader-content figure { margin: 1rem 0; }
    #lightbox-reader-content figcaption { font-size: 0.8rem; color: #888; margin-top: 0.35rem; }
    #lightbox-iframe {
      flex: 1;
      width: 100%;
      min-height: 0;
      border: none;
      border-radius: 0 0 8px 8px;
      background: #fff;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      padding: 1.5rem;
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-heading {
      font-size: 0.68rem;
      font-family: 'Verlag', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.65rem;
    }

    .source-list { list-style: none; margin-bottom: 1.5rem; }

    .source-list-item {
      position: relative;
      margin: 0 0.25rem;
      padding: 0.5rem 1.75rem 0.5rem 0.6rem;
      border-radius: 8px 8px 0 0;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      box-shadow: 0 1px 0 var(--border);
      transition: background 0.1s;
    }
    .source-list-item:last-child { box-shadow: none; border-radius: 8px; }
    .source-list-item:hover,
    .source-list-item:has(+ .source-list-item:hover) {
      box-shadow: none;
    }
    .source-list-item:hover { background: linen; }
    [data-theme="dark"] .source-list-item:hover { background: var(--surface); }
    .source-list-item { cursor: pointer; }
    .source-list-name a { color: inherit; text-decoration: none; }
    .source-list-item:hover .source-list-name a { color: var(--accent); }
    .source-list-item-active .source-list-name a { color: var(--accent); }

    .source-list-item .source-remove {
      position: absolute;
      right: 0;
      top: 0.35rem;
      width: 1.25rem;
      height: 1.25rem;
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .source-list-item:hover .source-remove { opacity: 1; }
    .source-list-item .source-remove:hover { color: var(--accent); }

    .source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.45rem;
    }

    .source-list-name {
      font-size: 0.83rem;
      font-weight: 600;
    }

    .source-list-desc {
      font-size: 0.73rem;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ── ADD SOURCE ── */
    #sidebar-add-source { margin-bottom: 1.25rem; }
    #add-source-form { display: flex; gap: 0.4rem; }
    #add-source-input {
      flex: 1;
      min-width: 0;
      font: inherit;
      font-size: 0.78rem;
      font-family: 'Verlag', sans-serif;
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    #add-source-input:focus { border-color: var(--accent); }
    #add-source-input::placeholder { color: var(--muted); }
    #add-source-btn {
      font: inherit;
      font-size: 0.78rem;
      font-family: 'Verlag', sans-serif;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    #add-source-btn:hover { background: var(--text); color: var(--bg); }
    #add-source-btn:disabled { opacity: 0.5; cursor: default; }
    #add-source-status {
      font-size: 0.72rem;
      color: var(--muted);
      margin: 0.3rem 0 0;
      min-height: 1em;
    }
    #add-source-status.error { color: #c44; }

    /* ── STATES ── */
    #loading, #error-msg {
      padding: 4rem 2rem;
      text-align: center;
      font-family: 'Verlag', sans-serif;
      color: var(--muted);
    }

    #ticker-summary {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      font-family: 'Verlag', sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--muted);
    }
    #ticker-summary strong {
      display: block;
      font-size: 1rem;
      color: var(--fg);
      margin-bottom: 0.3rem;
      letter-spacing: 0.01em;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-msg {
      padding: 3rem 2rem;
      text-align: center;
      color: var(--muted);
      font-family: 'Verlag', sans-serif;
    }

    #failed-notice {
      background: rgba(255,60,0,0.08);
      border: 1px solid rgba(255,60,0,0.2);
      border-radius: 4px;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-family: 'Verlag', sans-serif;
      color: var(--muted);
      margin: 0.75rem 2rem 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      #sidebar { display: none; }
      body::before { display: none; }
      #desktop-filter-row { display: none; }
      .filter-row::after { right: 0; }
      header { padding-right: 2rem; }
      #menu-btn {
        display: flex; align-items: center; background: none; border: none;
        color: var(--text); cursor: pointer; font-size: 1.4rem;
        padding: 0.25rem 0.4rem; line-height: 1; border-radius: 4px;
        transition: background 0.15s; flex-shrink: 0;
      }
      #menu-btn:hover { background: var(--surface); }
    }

    @media (max-width: 600px) {
      html, body { overflow-x: hidden; }
      header { padding: 0.75rem 1rem; }
      .site-title { font-size: 4.5rem; }
      #subtitle { white-space: normal; }
      .feed-item { padding: 1rem; }
      .item-title { font-size: 1.75rem; }
      .category-heading { padding: 0.75rem 1rem 0.5rem; }
    }
  </style>
</head>
<body>

<header>
      <!-- News ticker -->
<div id="ticker-bar" style="display:none;" aria-live="off" aria-label="Today's news ticker">
  <!-- <div id="ticker-label">Today</div> -->
  <div id="ticker-wrap">
    <div id="ticker-track"></div>
  </div>
</div>
  <div class="header-title-row">
    <div class="site-title-wrap">
      <span class="site-title"><span>Good news</span><button id="theme-toggle" type="button" aria-label="Toggle dark mode"></button></span>
    </div>
    <span id="subtitle">(sources for bad times)</span>
    <button id="menu-btn" aria-label="Open filters and sources">☰</button>
  </div>
</header>


<!-- Desktop topic filter (hidden on mobile) -->
<div class="filter-row" id="desktop-filter-row">
  <button class="filter-btn active" data-topic="all"><span class="filter-btn-width" aria-hidden="true">All</span><span class="filter-btn-text">All</span></button>
  <button class="filter-btn" data-topic="nyc"><span class="filter-btn-width" aria-hidden="true">NYC</span><span class="filter-btn-text">NYC</span></button>
  <button class="filter-btn" data-topic="culture"><span class="filter-btn-width" aria-hidden="true">Culture</span><span class="filter-btn-text">Culture</span></button>
  <button class="filter-btn" data-topic="tech"><span class="filter-btn-width" aria-hidden="true">Tech</span><span class="filter-btn-text">Tech</span></button>
  <button class="filter-btn" data-topic="media"><span class="filter-btn-width" aria-hidden="true">Media</span><span class="filter-btn-text">Media</span></button>
  <button class="filter-btn" data-topic="science"><span class="filter-btn-width" aria-hidden="true">Science</span><span class="filter-btn-text">Science</span></button>
  <button class="filter-btn" data-topic="politics"><span class="filter-btn-width" aria-hidden="true">Politics</span><span class="filter-btn-text">Politics</span></button>
  <button class="filter-btn" id="saved-filter-btn"><span class="filter-btn-width" aria-hidden="true">Saved</span><span class="filter-btn-text">Saved</span></button>
  <button class="filter-btn" id="read-filter-btn"><span class="filter-btn-width" aria-hidden="true">Read</span><span class="filter-btn-text">Read</span></button>
  <span class="filter-meta">
    <span id="result-count"></span>
    <span id="last-updated"></span>
  </span>
</div>

<main>
  <div id="feed">
    <div id="loading"><div class="spinner"></div>Fetching feeds…</div>
    <div id="error-msg" style="display:none"></div>
    <div id="ticker-summary" style="display:none"></div>
    <div id="items"></div>
  </div>

  <aside id="sidebar">
    <div id="sidebar-add-source">
      <form id="add-source-form" autocomplete="off">
        <input id="add-source-input" type="url" placeholder="Paste RSS feed URL…" aria-label="RSS feed URL" />
        <button id="add-source-btn" type="submit">Add</button>
      </form>
      <p id="add-source-status"></p>
    </div>
    <div id="sidebar-sources"></div>
  </aside>
</main>

<!-- ── BURGER MENU ── -->
<div id="menu-overlay"></div>
<div id="menu-panel" aria-label="Filters and sources">
  <div id="menu-panel-header">
    <div id="menu-meta">
      <span id="menu-result-count"></span>
      <span id="menu-last-updated"></span>
    </div>
    <button id="menu-close" aria-label="Close menu">×</button>
  </div>

  <!-- Ticker topics (populated by JS) -->
  <div id="menu-ticker-section">
    <div class="menu-section-label">Today</div>
    <div id="menu-ticker-list"></div>
  </div>

  <!-- Topic filters -->
  <div class="menu-section-label">Topics</div>
  <div id="menu-filter-topics">
    <button class="filter-btn active" data-topic="all"><span class="filter-btn-width" aria-hidden="true">All</span><span class="filter-btn-text">All</span></button>
    <button class="filter-btn" data-topic="nyc"><span class="filter-btn-width" aria-hidden="true">NYC</span><span class="filter-btn-text">NYC</span></button>
    <button class="filter-btn" data-topic="culture"><span class="filter-btn-width" aria-hidden="true">Culture</span><span class="filter-btn-text">Culture</span></button>
    <button class="filter-btn" data-topic="tech"><span class="filter-btn-width" aria-hidden="true">Tech</span><span class="filter-btn-text">Tech</span></button>
    <button class="filter-btn" data-topic="media"><span class="filter-btn-width" aria-hidden="true">Media</span><span class="filter-btn-text">Media</span></button>
    <button class="filter-btn" data-topic="science"><span class="filter-btn-width" aria-hidden="true">Science</span><span class="filter-btn-text">Science</span></button>
    <button class="filter-btn" data-topic="politics"><span class="filter-btn-width" aria-hidden="true">Politics</span><span class="filter-btn-text">Politics</span></button>
    <button class="filter-btn" id="menu-saved-filter-btn"><span class="filter-btn-width" aria-hidden="true">Saved</span><span class="filter-btn-text">Saved</span></button>
    <button class="filter-btn" id="menu-read-filter-btn"><span class="filter-btn-width" aria-hidden="true">Read</span><span class="filter-btn-text">Read</span></button>
  </div>

  <!-- Sources -->
  <div class="menu-section-label">Sources</div>
  <div id="menu-sources-inner">
    <div id="menu-sidebar-add-source">
      <form id="menu-add-source-form" autocomplete="off">
        <input id="menu-add-source-input" type="url" placeholder="Paste RSS feed URL…" aria-label="RSS feed URL" />
        <button id="menu-add-source-btn" type="submit">Add</button>
      </form>
      <p id="menu-add-source-status"></p>
    </div>
    <div id="menu-sidebar-sources"></div>
  </div>
</div>

<div id="lightbox" aria-hidden="true">
  <div id="lightbox-backdrop"></div>
  <div id="lightbox-box">
    <div id="lightbox-toolbar">
      <div style="display:flex;gap:0.75rem;align-items:center;">
        <a id="lightbox-open-tab" href="#" target="_blank" rel="noopener">Open in new tab</a>
        <button id="lightbox-reader-view-btn" type="button" style="display:none;">Reader view</button>
        <button id="lightbox-save-btn" type="button">Save for later</button>
      </div>
      <span id="lightbox-paywall-note">Hit a paywall? Open in new tab so your login applies.</span>
      <button id="lightbox-close" type="button" aria-label="Close">×</button>
    </div>
    <div id="lightbox-embed-blocked" class="lightbox-embed-blocked" style="display: none;">
      <div id="lightbox-reader">
        <div id="lightbox-reader-loading">Loading article…</div>
        <div id="lightbox-reader-error" style="display:none;">
          <p>Couldn’t load article content.</p>
          <p><a id="lightbox-open-tab-fallback" href="#" target="_blank" rel="noopener">Open in new tab</a> to read it.</p>
        </div>
        <div id="lightbox-reader-content" style="display:none;"></div>
      </div>
    </div>
    <iframe id="lightbox-iframe" title="Article"></iframe>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
