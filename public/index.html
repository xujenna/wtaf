<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WTAF — The Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #ff3c00;
      --newsletter: #4ade80;
      --newsroom: #60a5fa;
      --podcast: #f59e0b;
      --video: #c084fc;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .site-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-family: 'Arial Black', sans-serif;
      text-transform: uppercase;
    }

    .site-title span { color: var(--accent); }

    .site-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      font-family: sans-serif;
    }

    .header-meta {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: sans-serif;
      text-align: right;
    }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: sans-serif;
      margin-top: 0.25rem;
      transition: border-color 0.15s, color 0.15s;
    }

    #refresh-btn:hover { border-color: var(--text); color: var(--text); }
    #refresh-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── FILTER ROWS ── */
    .filter-row {
      padding: 0.75rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-size: 0.72rem;
      font-family: sans-serif;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 0.25rem;
      white-space: nowrap;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.25rem 0.8rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: var(--text); color: var(--text); }

    /* Category filter active states */
    .filter-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); font-weight: 600; }
    .filter-btn[data-cat="newsletter"].active { background: var(--newsletter); border-color: var(--newsletter); color: #000; }
    .filter-btn[data-cat="newsroom"].active   { background: var(--newsroom);   border-color: var(--newsroom);   color: #000; }
    .filter-btn[data-cat="podcast"].active    { background: var(--podcast);    border-color: var(--podcast);    color: #000; }
    .filter-btn[data-cat="video"].active      { background: var(--video);      border-color: var(--video);      color: #000; }

    /* Topic filter active states — matched by data-topic */
    .filter-btn[data-topic="tech"].active     { background: #22d3ee; border-color: #22d3ee; color: #000; }
    .filter-btn[data-topic="politics"].active { background: #f87171; border-color: #f87171; color: #000; }
    .filter-btn[data-topic="nyc"].active      { background: #2dd4bf; border-color: #2dd4bf; color: #000; }
    .filter-btn[data-topic="culture"].active  { background: #fb923c; border-color: #fb923c; color: #000; }
    .filter-btn[data-topic="media"].active    { background: #a78bfa; border-color: #a78bfa; color: #000; }
    .filter-btn[data-topic="labor"].active    { background: #fbbf24; border-color: #fbbf24; color: #000; }
    .filter-btn[data-topic="science"].active  { background: #86efac; border-color: #86efac; color: #000; }

    /* ── SEARCH ROW ── */
    .search-row {
      padding: 0.6rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    #source-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      font-size: 0.82rem;
      font-family: sans-serif;
      cursor: pointer;
    }

    #search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      font-size: 0.82rem;
      font-family: sans-serif;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }

    #search-input:focus { border-color: var(--muted); }
    #search-input::placeholder { color: var(--muted); }

    #result-count {
      margin-left: auto;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: sans-serif;
    }

    /* ── LAYOUT ── */
    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      min-height: calc(100vh - 200px);
    }

    /* ── FEED ── */
    #feed { border-right: 1px solid var(--border); }

    .feed-item {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .feed-item:hover { background: var(--surface); }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
    }

    .source-badge {
      font-size: 0.7rem;
      font-family: sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.1rem 0.45rem;
      border-radius: 3px;
      cursor: pointer;
    }

    .source-badge:hover { opacity: 0.8; }

    .cat-newsletter { background: rgba(74,222,128,0.15);  color: var(--newsletter); }
    .cat-newsroom   { background: rgba(96,165,250,0.15);  color: var(--newsroom); }
    .cat-podcast    { background: rgba(245,158,11,0.15);  color: var(--podcast); }
    .cat-video      { background: rgba(192,132,252,0.15); color: var(--video); }

    .topic-tag {
      font-size: 0.65rem;
      font-family: sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      cursor: pointer;
      opacity: 0.85;
    }

    .topic-tag:hover { opacity: 1; }

    .topic-tech     { background: rgba(34,211,238,0.12);  color: #22d3ee; }
    .topic-politics { background: rgba(248,113,113,0.12); color: #f87171; }
    .topic-nyc      { background: rgba(45,212,191,0.12);  color: #2dd4bf; }
    .topic-culture  { background: rgba(251,146,60,0.12);  color: #fb923c; }
    .topic-media    { background: rgba(167,139,250,0.12); color: #a78bfa; }
    .topic-labor    { background: rgba(251,191,36,0.12);  color: #fbbf24; }
    .topic-science  { background: rgba(134,239,172,0.12); color: #86efac; }

    .item-date {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: sans-serif;
    }

    .item-title {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.4rem;
    }

    .item-title a:hover { color: var(--accent); text-decoration: none; }

    .item-snippet {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      padding: 1.5rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-heading {
      font-size: 0.68rem;
      font-family: sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.65rem;
    }

    .source-list { list-style: none; margin-bottom: 1.5rem; }

    .source-list-item {
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .source-list-item:last-child { border-bottom: none; }

    .source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.45rem;
    }

    .source-list-name {
      font-size: 0.83rem;
      font-weight: 600;
    }

    .source-list-name a:hover { color: var(--accent); }

    .source-list-desc {
      font-size: 0.73rem;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ── STATES ── */
    #loading, #error-msg {
      padding: 4rem 2rem;
      text-align: center;
      font-family: sans-serif;
      color: var(--muted);
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-msg {
      padding: 3rem 2rem;
      text-align: center;
      color: var(--muted);
      font-family: sans-serif;
    }

    #failed-notice {
      background: rgba(255,60,0,0.08);
      border: 1px solid rgba(255,60,0,0.2);
      border-radius: 4px;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-family: sans-serif;
      color: var(--muted);
      margin: 0.75rem 2rem 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      #sidebar { display: none; }
    }

    @media (max-width: 600px) {
      header, .filter-row, .search-row { padding: 0.75rem 1rem; }
      .feed-item { padding: 1rem; }
      #search-input { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="site-title"><span>WTAF</span> — The Feed</div>
    <div class="site-subtitle">Your weird little flotilla, aggregated.</div>
  </div>
  <div class="header-meta">
    <div id="last-updated"></div>
    <button id="refresh-btn" onclick="loadFeed(true)">Refresh</button>
  </div>
</header>

<!-- Category filter -->
<div class="filter-row">
  <span class="filter-label">Type:</span>
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="newsletter">Newsletters</button>
  <button class="filter-btn" data-cat="newsroom">Newsrooms</button>
  <button class="filter-btn" data-cat="podcast">Podcasts</button>
  <button class="filter-btn" data-cat="video">Video</button>
</div>

<!-- Topic filter -->
<div class="filter-row">
  <span class="filter-label">Topic:</span>
  <button class="filter-btn active" data-topic="all">All</button>
  <button class="filter-btn" data-topic="tech">Tech</button>
  <button class="filter-btn" data-topic="politics">Politics</button>
  <button class="filter-btn" data-topic="nyc">NYC</button>
  <button class="filter-btn" data-topic="culture">Culture</button>
  <button class="filter-btn" data-topic="media">Media</button>
  <button class="filter-btn" data-topic="labor">Labor</button>
  <button class="filter-btn" data-topic="science">Science</button>
</div>

<!-- Source + search -->
<div class="search-row">
  <select id="source-select">
    <option value="">All sources</option>
  </select>
  <input id="search-input" type="search" placeholder="Search headlines…" autocomplete="off">
  <span id="result-count"></span>
</div>

<main>
  <div id="feed">
    <div id="loading"><div class="spinner"></div>Fetching feeds…</div>
    <div id="error-msg" style="display:none"></div>
    <div id="items"></div>
  </div>

  <aside id="sidebar">
    <div id="sidebar-sources"></div>
  </aside>
</main>

<script>
  // ── Topic definitions
  const TOPICS = {
    tech:     { label: 'Tech',     keywords: ['ai', 'a.i.', 'artificial intelligence', 'software', ' app ', 'apple', 'google', 'meta ', 'twitter', 'tiktok', 'algorithm', 'data', 'privacy', 'hack', 'cyber', 'startup', 'crypto', 'bitcoin', 'blockchain', 'openai', 'chatgpt', 'musk', 'silicon', 'internet', 'digital', 'platform', 'social media', 'youtube', 'instagram', 'facebook', 'microsoft', 'amazon', 'surveillance', 'big tech', 'antitrust', 'tech ', 'technology', 'robot', 'automation', 'section 230', 'deepfake', 'sam altman', 'anthropic'] },
    politics: { label: 'Politics', keywords: ['trump', 'biden', 'congress', 'senate', 'democrat', 'republican', 'election', 'government', 'federal', 'administration', 'president', 'white house', 'supreme court', 'doj', 'fbi', 'cia', 'epstein', 'maga', 'gop', 'legislation', 'tariff', 'immigration', 'border', 'ukraine', 'russia', 'israel', 'gaza', 'nato', 'doge', 'cabinet', 'political', 'policy', 'vote', 'ballot'] },
    nyc:      { label: 'NYC',      keywords: ['new york', 'nyc', 'brooklyn', 'manhattan', 'bronx', 'queens', 'staten island', 'subway', 'mta', 'new york city', 'the city'] },
    culture:  { label: 'Culture',  keywords: ['film', 'movie', 'music', 'art ', 'book', 'novel', ' tv ', 'comedy', 'celebrity', 'fashion', 'style', 'sports', 'nfl', 'nba', 'baseball', 'football', 'basketball', 'entertainment', 'hollywood', 'award', 'oscar', 'grammy', 'meme', 'viral', 'influencer', 'creator', 'fandom', 'culture', 'review', 'streaming show', 'podcast', 'album', 'tour', 'performance'] },
    media:    { label: 'Media',    keywords: ['newsletter', 'journalist', 'journalism', 'media ', 'newspaper', 'magazine', 'reporter', 'editorial', 'substack', 'cable news', 'msnbc', 'cnn', 'fox news', 'new york times', 'layoff', 'newsroom', 'publication', 'press', 'broadcast', 'anchor'] },
    labor:    { label: 'Labor',    keywords: ['union', 'worker', 'labor', 'strike', 'wage', 'salary', 'employment', 'workplace', 'gig economy', 'freelance', 'organize', 'collective', 'layoff', 'fired', 'hired', 'job ', 'jobs ', 'work ', 'workers'] },
    science:  { label: 'Science',  keywords: ['science', 'research', 'study ', 'climate', 'environment', 'health', 'medicine', 'space', 'nasa', 'biology', 'chemistry', 'physics', 'discovery', 'species', 'ocean', 'planet', 'nature', 'animal', 'disease', 'drug', 'vaccine', 'gene', 'evolution'] },
  };

  const CAT_COLORS = {
    newsletter: 'var(--newsletter)',
    newsroom:   'var(--newsroom)',
    podcast:    'var(--podcast)',
    video:      'var(--video)',
  };

  function getTopics(item) {
    const text = ((item.title || '') + ' ' + (item.snippet || '')).toLowerCase();
    return Object.keys(TOPICS).filter(key =>
      TOPICS[key].keywords.some(kw => text.includes(kw))
    );
  }

  let allItems = [];
  let allSources = [];
  let activeCategory = 'all';
  let activeTopic = 'all';
  let activeSource = '';
  let searchQuery = '';

  // ── Sidebar + source select
  async function loadSources() {
    try {
      const res = await fetch('/api/sources');
      allSources = await res.json();
      buildSidebar();
      buildSourceSelect();
    } catch (e) {
      console.error('Could not load sources', e);
    }
  }

  function buildSidebar() {
    const section = document.getElementById('sidebar-sources');
    const cats = ['newsroom', 'newsletter', 'podcast', 'video'];
    const labels = { newsroom: 'Newsrooms', newsletter: 'Newsletters', podcast: 'Podcasts', video: 'Video' };

    section.innerHTML = cats.map(cat => {
      const sources = allSources.filter(s => s.category === cat);
      if (!sources.length) return '';
      return `
        <div>
          <div class="sidebar-heading">${labels[cat]}</div>
          <ul class="source-list">
            ${sources.map(s => `
              <li class="source-list-item">
                <span class="source-dot" style="background:${CAT_COLORS[cat]}"></span>
                <div>
                  <div class="source-list-name"><a href="${s.url}" target="_blank" rel="noopener">${s.name}</a></div>
                  <div class="source-list-desc">${s.description}</div>
                </div>
              </li>
            `).join('')}
          </ul>
        </div>
      `;
    }).join('');
  }

  function buildSourceSelect() {
    const sel = document.getElementById('source-select');
    const feedSources = allSources.filter(s => s.hasRss);
    const cats = ['newsroom', 'newsletter', 'podcast'];
    const labels = { newsroom: 'Newsrooms', newsletter: 'Newsletters', podcast: 'Podcasts' };

    cats.forEach(cat => {
      const sources = feedSources.filter(s => s.category === cat);
      if (!sources.length) return;
      const og = document.createElement('optgroup');
      og.label = labels[cat];
      sources.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = s.name;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
  }

  // ── Fetch
  async function loadFeed(force = false) {
    if (force) {
      allItems = [];
      document.getElementById('items').innerHTML = '';
    }
    const loading = document.getElementById('loading');
    const errMsg  = document.getElementById('error-msg');
    const btn     = document.getElementById('refresh-btn');

    loading.style.display = 'block';
    errMsg.style.display  = 'none';
    btn.disabled = true;
    btn.textContent = 'Loading…';

    try {
      const res  = await fetch(force ? '/api/feeds?bust=' + Date.now() : '/api/feeds');
      const data = await res.json();
      allItems   = data.items || [];

      document.getElementById('last-updated').textContent =
        `Updated ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

      const existing = document.getElementById('failed-notice');
      if (existing) existing.remove();
      if (data.failed?.length) {
        const notice = document.createElement('div');
        notice.id = 'failed-notice';
        notice.textContent = `Couldn't reach: ${data.failed.join(', ')}`;
        document.querySelector('main').before(notice);
      }

      renderItems();
    } catch (e) {
      errMsg.style.display = 'block';
      errMsg.textContent   = 'Failed to load feeds. Is the server running?';
    } finally {
      loading.style.display = 'none';
      btn.disabled   = false;
      btn.textContent = 'Refresh';
    }
  }

  // ── Render
  function renderItems() {
    const q = searchQuery.toLowerCase();

    const filtered = allItems.filter(item => {
      if (activeCategory !== 'all' && item.category !== activeCategory) return false;
      if (activeSource && item.source !== activeSource) return false;
      if (activeTopic !== 'all' && !getTopics(item).includes(activeTopic)) return false;
      if (q && !item.title.toLowerCase().includes(q) && !(item.snippet || '').toLowerCase().includes(q)) return false;
      return true;
    });

    document.getElementById('result-count').textContent = filtered.length
      ? `${filtered.length.toLocaleString()} item${filtered.length === 1 ? '' : 's'}`
      : '';

    const container = document.getElementById('items');

    if (!filtered.length) {
      container.innerHTML = '<div class="empty-msg">No items match your filters.</div>';
      return;
    }

    container.innerHTML = filtered.map(item => {
      const itemTopics = getTopics(item);
      const topicTags = itemTopics.map(t =>
        `<span class="topic-tag topic-${t}" onclick="filterByTopic('${t}')" title="Filter to ${TOPICS[t].label}">${TOPICS[t].label}</span>`
      ).join('');

      return `
        <article class="feed-item">
          <div class="item-meta">
            <span
              class="source-badge cat-${item.category}"
              onclick="filterBySource('${item.source.replace(/'/g, "\\'")}')"
              title="Filter to ${item.source}"
            >${item.source}</span>
            ${topicTags}
            ${item.date ? `<span class="item-date">${formatDate(item.date)}</span>` : ''}
          </div>
          <div class="item-title">
            <a href="${item.link}" target="_blank" rel="noopener">${escHtml(item.title)}</a>
          </div>
          ${item.snippet ? `<div class="item-snippet">${escHtml(item.snippet)}</div>` : ''}
        </article>
      `;
    }).join('');
  }

  // ── Filter handlers
  function filterBySource(name) {
    document.getElementById('source-select').value = name;
    activeSource = name;
    renderItems();
  }

  function filterByTopic(topic) {
    document.querySelectorAll('.filter-btn[data-topic]').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.filter-btn[data-topic="${topic}"]`);
    if (btn) btn.classList.add('active');
    activeTopic = topic;
    renderItems();
  }

  document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      document.getElementById('source-select').value = '';
      activeSource = '';
      renderItems();
    });
  });

  document.querySelectorAll('.filter-btn[data-topic]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-topic]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTopic = btn.dataset.topic;
      renderItems();
    });
  });

  document.getElementById('source-select').addEventListener('change', e => {
    activeSource = e.target.value;
    renderItems();
  });

  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      renderItems();
    }, 200);
  });

  // ── Helpers
  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const diff = Date.now() - d;
    const mins  = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days  = Math.floor(diff / 86400000);
    if (mins  <  1)  return 'just now';
    if (mins  < 60)  return `${mins}m ago`;
    if (hours < 24)  return `${hours}h ago`;
    if (days  <  7)  return `${days}d ago`;
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Init
  loadSources();
  loadFeed();
</script>
